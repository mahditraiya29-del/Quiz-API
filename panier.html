<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panier - KEF Muscle Store</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    :root {
      --bg: #05070c;
      --panel: rgba(255, 255, 255, .05);
      --text: #f5f7ff;
      --blue: #00a3ff;
      --glow: 0 0 24px rgba(0, 163, 255, .22);
      --radius: 28px;
      --green: #00ff88;
      --orange: #ff9500;
      --red: #ff3131;
    }
    * { box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(180deg, #05070c 0%, #070b14 100%);
      color: var(--text);
      margin: 0;
      padding: 20px;
      max-width: 1000px;
      margin: 0 auto;
    }

    .top-nav { display: flex; align-items: center; margin-bottom: 20px; }
    .back-link { color: var(--blue); text-decoration: none; font-family: 'Orbitron'; font-size: 0.9rem; display: flex; align-items: center; gap: 8px; transition: 0.3s; }
    .back-link:hover { opacity: 0.7; }

    .cart-item { display: flex; gap: 20px; padding: 20px; border: 1px solid rgba(255, 255, 255, .1); border-radius: 20px; margin-bottom: 16px; background: var(--panel); align-items: center; }
    .cart-img { width: 80px; height: 80px; border-radius: 16px; object-fit: cover; }
    .cart-details { flex: 1; }
    .cart-name { font-family: 'Orbitron'; font-size: 0.9rem; margin: 0 0 8px; }
    .cart-price { color: #5fcfff; font-weight: 700; margin-bottom: 10px; }
    
    .quantity-controls { display: flex; gap: 10px; align-items: center; }
    .qty-btn { width: 35px; height: 35px; border-radius: 10px; background: rgba(0, 163, 255, .2); border: 1px solid rgba(0, 163, 255, .3); color: #fff; cursor: pointer; }
    .remove-btn { background: rgba(220, 53, 69, .1); color: #ff6b7a; border: none; padding: 10px; border-radius: 10px; cursor: pointer; margin-left: auto; }
    
    .cart-summary { margin-top: 30px; padding: 30px; border-radius: var(--radius); background: var(--panel); border: 1px solid rgba(255,255,255,.05); }
    .promo-group { display: flex; gap: 10px; margin-bottom: 10px; }
    .promo-input { flex: 1; background: #000; border: 1px solid #222; color: #fff; padding: 12px; border-radius: 12px; outline: none; }
    .promo-input:focus { border-color: var(--blue); }
    
    #pMsg { font-size: 0.85rem; margin-bottom: 15px; font-weight: 700; min-height: 20px; text-transform: uppercase; }

    .price-row { display: flex; justify-content: space-between; margin-bottom: 10px; color: #888; }
    .total-row { border-top: 1px solid #222; padding-top: 20px; color: var(--blue); font-family: 'Orbitron'; font-size: 1.8rem; }
    .checkout-btn { width: 100%; padding: 20px; background: linear-gradient(135deg, #00a3ff, #0f66ff); color: #fff; border-radius: 20px; font-weight: 700; border: none; cursor: pointer; margin-top: 20px; font-family: 'Orbitron'; box-shadow: var(--glow); }
    
    .info-inputs { display: none; flex-direction: column; gap: 12px; margin-top: 20px; border-top: 1px solid #222; padding-top: 20px; }
    .info-inputs.active { display: flex; }
  </style>
</head>
<body>

  <div class="top-nav">
    <a href="index.html" class="back-link"><i class="fa-solid fa-arrow-left"></i> RETOUR</a>
  </div>

  <h1 style="text-align:center; font-family: 'Orbitron'; color: var(--blue); margin-bottom:30px;">
    <i class="fa-solid fa-cart-shopping"></i> Mon Panier
  </h1>
  
  <div id="cartContainer"></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, get, child, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAbx2TedCymp6XS23JVbLP...",
        databaseURL: "https://musclestore-3d441-default-rtdb.firebaseio.com/",
        projectId: "musclestore-3d441"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const dbRef = ref(db);

    let cart = JSON.parse(localStorage.getItem('cart')) || [];
    let activeDiscount = 0;
    let promoData = null;
    let infoStep = false;

    window.updateCartDisplay = function() {
      const container = document.getElementById('cartContainer');
      if (cart.length === 0) {
        container.innerHTML = `<div style="text-align:center; padding:50px;"><h2>Votre panier est vide</h2><a href="index.html" style="color:var(--blue); text-decoration:none; font-family:'Orbitron'">RETOUR À L'ACCUEIL</a></div>`;
        return;
      }
      
      let itemsHtml = cart.map((item, index) => `
        <div class="cart-item">
          <img src="${item.imgSrc}" class="cart-img">
          <div class="cart-details">
            <h3 class="cart-name">${item.name}</h3>
            <div class="cart-price">${item.price}</div>
            <div class="quantity-controls">
              <button class="qty-btn" onclick="changeQuantity(${index}, -1)">-</button>
              <span>${item.quantity}</span>
              <button class="qty-btn" onclick="changeQuantity(${index}, 1)">+</button>
              <button class="remove-btn" onclick="removeItem(${index})"><i class="fa-solid fa-trash"></i></button>
            </div>
          </div>
        </div>
      `).join('');

      container.innerHTML = itemsHtml + `
        <div class="cart-summary">
          <div class="promo-group">
            <input type="text" id="pInput" class="promo-input" placeholder="CODE PROMO">
            <button class="qty-btn" style="width:auto; padding:0 20px;" onclick="applyPromo()">APPLY</button>
          </div>
          <p id="pMsg"></p>

          <div id="priceDetails"></div>

          <div id="infoSection" class="info-inputs">
            <input type="text" id="custNom" class="promo-input" placeholder="Nom et Prénom *">
            <input type="text" id="custTel1" class="promo-input" placeholder="Téléphone 1 *">
            <input type="text" id="custTel2" class="promo-input" placeholder="Téléphone 2 (Optionnel)">
            <input type="text" id="custVille" class="promo-input" placeholder="Ville *">
          </div>
          <button class="checkout-btn" id="confirmBtn" onclick="handleOrder()">PASSER À LA CAISSE</button>
        </div>
      `;
      calculatePrices();
    }

    window.calculatePrices = function() {
        const subtotal = cart.reduce((sum, item) => {
            const priceNum = parseFloat(item.price.replace('DT', '').replace(',', '.').trim());
            return sum + (priceNum * item.quantity);
        }, 0);
        const total = (subtotal + 7) * (1 - (activeDiscount / 100));
        const priceDetails = document.getElementById('priceDetails');
        if(priceDetails) {
            priceDetails.innerHTML = `
                <div class="price-row"><span>Sous-total</span><span>${subtotal.toFixed(2)} DT</span></div>
                <div class="price-row"><span>Livraison</span><span>7.00 DT</span></div>
                <div class="price-row total-row"><span>TOTAL</span><span>${total.toFixed(2)} DT</span></div>
            `;
        }
    }

    window.applyPromo = async function() {
        const msg = document.getElementById('pMsg');
        const code = document.getElementById('pInput').value.toUpperCase();
        if(!code) return;
        msg.innerText = "Vérification...";
        msg.style.color = "gray";

        try {
            const snapshot = await get(child(dbRef, `promos/${code}`));
            if (snapshot.exists()) {
                const data = snapshot.val();
                const now = new Date().toISOString().split('T')[0];
                if (now <= data.expiry) {
                    if ((data.used || 0) < (data.limit || 0)) {
                        activeDiscount = data.discount;
                        promoData = data;
                        msg.innerText = `CODE ACCEPTÉ: -${activeDiscount}% ✅`;
                        msg.style.color = "var(--green)";
                    } else {
                        activeDiscount = 0;
                        msg.innerText = "CE CODE A DÉJÀ ÉTÉ UTILISÉ 🟠";
                        msg.style.color = "var(--orange)";
                    }
                } else {
                    activeDiscount = 0;
                    msg.innerText = "CODE PROMO EXPIRÉ ❌";
                    msg.style.color = "var(--red)";
                }
            } else {
                activeDiscount = 0;
                msg.innerText = "CODE INVALIDE ❌";
                msg.style.color = "var(--red)";
            }
            calculatePrices();
        } catch (e) { msg.innerText = "ERREUR ⚠️"; msg.style.color = "var(--red)"; }
    }

    window.handleOrder = async function() {
        const infoSection = document.getElementById('infoSection');
        const confirmBtn = document.getElementById('confirmBtn');

        if(!infoStep) {
            infoSection.classList.add('active');
            confirmBtn.innerText = "CONFIRMER L'ENVOI";
            infoStep = true;
            return;
        }

        const nom = document.getElementById('custNom').value.trim();
        const tel1 = document.getElementById('custTel1').value.trim();
        const tel2 = document.getElementById('custTel2').value.trim() || "N/A";
        const ville = document.getElementById('custVille').value.trim();

        // التحقق من الحقول الإجبارية فقط
        if(!nom || !tel1 || !ville) {
            alert("Veuillez remplir les champs obligatoires (*)");
            return;
        }

        let itemsText = "";
        cart.forEach(i => itemsText += `- ${i.name} (x${i.quantity})\n`);
        const finalTotal = document.querySelector('.total-row span:last-child').innerText;

        const finalMsg = `🚀 COMMANDE KEF MUSCLE STORE\n\n👤 Client: ${nom}\n📞 Tél 1: ${tel1}\n📞 Tél 2: ${tel2}\n📍 Ville: ${ville}\n\n🛒 Produits:\n${itemsText}\n💰 TOTAL: ${finalTotal}`;

        if(promoData) {
            const code = document.getElementById('pInput').value.toUpperCase();
            await update(ref(db, `promos/${code}`), { used: (promoData.used || 0) + 1 });
        }

        navigator.clipboard.writeText(finalMsg).then(() => {
            alert("✅ Commande copiée ! Collez-la sur Instagram.");
            window.location.href = "https://www.instagram.com/kefmusclestore/";
            localStorage.removeItem('cart');
        });
    }

    window.changeQuantity = (index, delta) => {
      if (cart[index].quantity + delta > 0) {
        cart[index].quantity += delta;
        localStorage.setItem('cart', JSON.stringify(cart));
        updateCartDisplay();
      }
    }

    window.removeItem = (index) => {
      cart.splice(index, 1);
      localStorage.setItem('cart', JSON.stringify(cart));
      updateCartDisplay();
    }

    updateCartDisplay();
  </script>
</body>
</html>
