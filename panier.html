<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Panier & Suivi - KEF Muscle Store</title>
  
  <script>
    // 1. Vérification et application immédiate du thème
    (function() {
      const savedTheme = localStorage.getItem('kef-theme') || 'light';
      if (savedTheme === 'dark') {
        document.documentElement.classList.add('dark-theme');
      } else {
        document.documentElement.classList.remove('dark-theme');
      }
    })();
  </script>

  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&family=Orbitron:wght@700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  
  <style>
    :root {
      --bg: #f8f9fa;
      --panel: #ffffff;
      --panel-light: #e9ecef;
      --text: #1a191d;
      --text-muted: #6c757d;
      --primary: #007bc0;
      --primary-dark: #0056b3;
      --border: #e9ecef;
      --radius: 24px;
      --radius-sm: 16px;
      --green: #22c55e;
      --orange: #f59e0b;
      --red: #ef4444;
    }

    .dark-theme, :root.dark-theme {
      --bg: #0a0c10;
      --panel: #111827;
      --panel-light: #1f2937;
      --text: #ffffff;
      --text-muted: #9ca3af;
      --primary: #3b82f6;
      --primary-dark: #2563eb;
      --border: #1f2937;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Inter', 'Tajawal', sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 20px;
      max-width: 1000px;
      margin: 0 auto;
      transition: background 0.3s ease, color 0.3s ease;
    }

    .top-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
    .back-link { color: var(--primary); text-decoration: none; font-family: 'Orbitron'; font-size: 0.9rem; display: flex; align-items: center; gap: 8px; transition: 0.3s; font-weight: bold; }
    .back-link:hover { opacity: 0.7; }
    
    .tab-buttons { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 2px solid var(--border); padding-bottom: 10px; }
    .tab-btn { background: none; border: none; color: var(--text-muted); padding: 10px 20px; cursor: pointer; font-size: 0.95rem; font-weight: bold; transition: 0.3s; border-radius: 30px; }
    .tab-btn.active { background: var(--primary); color: white; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    
    .cart-item { display: flex; gap: 20px; padding: 20px; border: 1px solid var(--border); border-radius: var(--radius-sm); margin-bottom: 16px; background: var(--panel); align-items: center; flex-wrap: wrap; box-shadow: 0 4px 15px rgba(0,0,0,0.02); }
    .dark-theme .cart-item { box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
    .cart-img { width: 80px; height: 80px; border-radius: 12px; object-fit: cover; background: var(--panel-light); }
    .cart-details { flex: 1; min-width: 150px; }
    .cart-name { font-size: 1rem; margin-bottom: 8px; font-weight: 700; }
    .cart-price { color: var(--primary); font-weight: 800; margin-bottom: 10px; font-size: 1.1rem; }
    .quantity-controls { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    
    .qty-btn { width: 35px; height: 35px; border-radius: 10px; background: var(--panel-light); border: 1px solid var(--border); color: var(--text); cursor: pointer; font-size: 16px; transition: all 0.2s; display: flex; align-items: center; justify-content: center; font-weight: bold; }
    .qty-btn:hover { background: var(--primary); color: #fff; border-color: var(--primary); }
    
    .remove-btn { background: rgba(239, 68, 68, 0.1); color: var(--red); border: none; padding: 8px 14px; border-radius: 10px; cursor: pointer; margin-left: auto; transition: all 0.2s; font-weight: bold; font-size: 0.85rem; }
    .remove-btn:hover { background: var(--red); color: #fff; }
    
    .cart-summary { margin-top: 30px; padding: 25px; border-radius: var(--radius); background: var(--panel); border: 1px solid var(--border); box-shadow: 0 4px 20px rgba(0,0,0,0.03); }
    .promo-group { display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; }
    
    .promo-input { flex: 1; background: var(--panel-light); border: 1px solid var(--border); color: var(--text); padding: 12px; border-radius: 12px; outline: none; font-size: 0.95rem; }
    .promo-input:focus { border-color: var(--primary); }
    
    #pMsg { font-size: 0.85rem; margin-bottom: 15px; font-weight: 700; min-height: 20px; }
    .price-row { display: flex; justify-content: space-between; margin-bottom: 12px; color: var(--text-muted); font-size: 0.95rem; }
    .total-row { border-top: 2px dashed var(--border); padding-top: 20px; margin-top: 15px; color: var(--primary); font-size: 1.4rem; font-weight: 800; }
    
    .checkout-btn { width: 100%; padding: 16px; background: var(--primary); color: #fff; border-radius: 16px; font-weight: 800; border: none; cursor: pointer; margin-top: 20px; font-size: 1.1rem; transition: all 0.2s; box-shadow: 0 4px 12px rgba(59, 130, 246, 0.2); }
    .checkout-btn:hover { background: var(--primary-dark); transform: translateY(-2px); }
    
    .info-inputs { display: none; flex-direction: column; gap: 12px; margin-top: 20px; border-top: 1px solid var(--border); padding-top: 20px; }
    .info-inputs.active { display: flex; }
    
    .empty-cart { text-align: center; padding: 60px 20px; }
    .empty-cart h2 { margin-bottom: 20px; font-weight: 700; }
    .empty-cart a { color: var(--primary); text-decoration: none; font-weight: bold; border-bottom: 2px solid var(--primary); padding-bottom: 3px; }
    
    .toast-message { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: var(--green); color: white; padding: 12px 24px; border-radius: 50px; font-weight: bold; z-index: 1000; animation: fadeInOut 3s ease; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
    @keyframes fadeInOut { 0% { opacity: 0; transform: translateX(-50%) translateY(20px); } 10% { opacity: 1; transform: translateX(-50%) translateY(0); } 90% { opacity: 1; } 100% { opacity: 0; transform: translateX(-50%) translateY(-20px); } }
    
    /* Style Suivi des Commandes */
    .order-card { background: var(--panel); border-radius: var(--radius-sm); padding: 20px; margin-bottom: 20px; border: 1px solid var(--border); transition: all 0.3s; box-shadow: 0 4px 10px rgba(0,0,0,0.02); }
    .order-card:hover { transform: translateY(-3px); border-color: var(--primary); }
    .order-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; flex-wrap: wrap; gap: 10px; }
    .order-id { background: var(--primary); color: #fff; padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; font-family: 'Orbitron'; }
    .order-date { font-size: 12px; color: var(--text-muted); }
    .status-badge { padding: 6px 14px; border-radius: 20px; font-size: 12px; font-weight: bold; }
    .status-pending { background: rgba(245, 158, 11, 0.15); color: #d97706; }
    .status-shipping { background: rgba(59, 130, 246, 0.15); color: #2563eb; }
    .status-delivered { background: rgba(34, 197, 94, 0.15); color: #16a34a; }
    .products-list { margin: 15px 0; padding: 12px; background: var(--panel-light); border-radius: 12px; }
    .product-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 14px; }
    .product-item:last-child { border-bottom: none; }
    .total-price { font-size: 1.1rem; font-weight: 800; color: var(--green); margin-top: 10px; text-align: right; }
    .empty-state { text-align: center; padding: 60px 20px; background: var(--panel); border-radius: var(--radius-sm); border: 1px solid var(--border); }
    .empty-state i { font-size: 50px; color: var(--text-muted); margin-bottom: 20px; }
    
    @media (max-width: 600px) { 
      body { padding: 15px; } 
      .cart-item { flex-direction: column; text-align: center; } 
      .remove-btn { margin-left: 0; margin-top: 10px; width: 100%; } 
      .quantity-controls { justify-content: center; width: 100%; } 
      .order-header { flex-direction: column; align-items: flex-start; } 
    }
  </style>
</head>
<body>

  <div class="top-nav">
    <a href="index.html" class="back-link"><i class="fa-solid fa-arrow-left"></i> RETOUR</a>
  </div>

  <h1 style="text-align:center; margin-bottom:30px; font-weight: 800;">
    <i class="fa-solid fa-cart-shopping" style="color: var(--primary);"></i> Mon Panier
  </h1>

  <div class="tab-buttons">
    <button class="tab-btn active" onclick="switchTab('cart')"><i class="fa-solid fa-bag-shopping"></i> Panier</button>
    <button class="tab-btn" onclick="switchTab('orders')"><i class="fa-solid fa-truck"></i> Suivi de mes commandes</button>
  </div>

  <div id="cart-tab" class="tab-content active">
    <div id="cartContainer"></div>
  </div>

  <div id="orders-tab" class="tab-content">
    <div id="ordersContainer"></div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, get, child, push, set, update, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyC56JLEqoOhQo194L8cv33nI7o5m04Ya9g",
        authDomain: "kef-muscle-store-b3ba0.firebaseapp.com",
        projectId: "kef-muscle-store-b3ba0",
        storageBucket: "kef-muscle-store-b3ba0.firebasestorage.app",
        messagingSenderId: "57477768198",
        appId: "1:57477768198:web:40ba3c97a67fd2ea3a0f87",
        measurementId: "G-CYZ5PW5G99"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const dbRef = ref(db);

    let cart = JSON.parse(localStorage.getItem('cart')) || [];
    let activeDiscount = 0;
    let promoData = null;
    let infoStep = false;
    let userOrders = JSON.parse(localStorage.getItem('userOrders')) || [];

    function applyTheme(theme) {
        if (theme === 'dark') {
            document.documentElement.classList.add('dark-theme');
            document.body.classList.add('dark-theme');
        } else {
            document.documentElement.classList.remove('dark-theme');
            document.body.classList.remove('dark-theme');
        }
    }

    function checkAndApplyInitialTheme() {
        const savedTheme = localStorage.getItem('kef-theme') || 'light';
        applyTheme(savedTheme);
    }
    checkAndApplyInitialTheme();

    window.addEventListener('storage', (e) => {
        if (e.key === 'kef-theme') {
            applyTheme(e.newValue);
        }
    });

    window.addEventListener('focus', checkAndApplyInitialTheme);

    function showToast(message, isError = false) {
      const toast = document.createElement('div');
      toast.className = 'toast-message';
      toast.style.background = isError ? 'var(--red)' : 'var(--green)';
      toast.innerText = message;
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
    }

    function switchTab(tab) {
      document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
      if (tab === 'cart') {
        document.getElementById('cart-tab').classList.add('active');
        document.querySelector('.tab-btn:first-child').classList.add('active');
      } else {
        document.getElementById('orders-tab').classList.add('active');
        document.querySelector('.tab-btn:last-child').classList.add('active');
        loadOrders();
      }
    }
    window.switchTab = switchTab;

    function getProductPrice(item) {
        let price = item.price || item.currentPrice;
        if (typeof price === 'number') return price;
        if (typeof price === 'string') {
            const priceNum = parseFloat(price.replace('DT', '').replace(',', '.').trim());
            return isNaN(priceNum) ? 0 : priceNum;
        }
        if (item.finalPrice) return parseFloat(item.finalPrice);
        return 0;
    }

    window.updateCartDisplay = function() {
      const container = document.getElementById('cartContainer');
      if (cart.length === 0) {
        container.innerHTML = `<div class="empty-cart"><h2>🛒 Votre panier est actuellement vide</h2><a href="index.html">Retour à l'accueil et voir les produits</a></div>`;
        return;
      }
      
      let itemsHtml = cart.map((item, index) => {
        const priceNum = getProductPrice(item);
        const priceDisplay = priceNum.toFixed(2) + ' DT';
        const imgSrc = item.img || item.imageUrl || 'https://via.placeholder.com/80';
        return `
          <div class="cart-item" data-index="${index}">
            <img src="${imgSrc}" class="cart-img" onerror="this.src='https://via.placeholder.com/80'">
            <div class="cart-details">
              <h3 class="cart-name">${escapeHtml(item.name)}</h3>
              <div class="cart-price">${priceDisplay}</div>
              <div class="quantity-controls">
                <button class="qty-btn" onclick="changeQuantity(${index}, -1)">-</button>
                <span>${item.quantity || 1}</span>
                <button class="qty-btn" onclick="changeQuantity(${index}, 1)">+</button>
                <button class="remove-btn" onclick="removeItem(${index})"><i class="fa-solid fa-trash"></i> Supprimer</button>
              </div>
            </div>
          </div>`;
      }).join('');

      container.innerHTML = itemsHtml + `
        <div class="cart-summary">
          <div class="promo-group">
            <input type="text" id="pInput" class="promo-input" placeholder="Code promo">
            <button class="qty-btn" style="width:auto; padding:0 25px;" onclick="applyPromo()">Appliquer</button>
          </div>
          <p id="pMsg"></p>
          <div id="priceDetails"></div>
          <div id="infoSection" class="info-inputs">
            <input type="text" id="custNom" class="promo-input" placeholder="Nom & Prénom complet *">
            <input type="tel" id="custTel1" class="promo-input" placeholder="Téléphone principal *">
            <input type="tel" id="custTel2" class="promo-input" placeholder="Téléphone secondaire (Optionnel)">
            <input type="text" id="custVille" class="promo-input" placeholder="Ville / Gouvernorat *">
          </div>
          <button class="checkout-btn" id="confirmBtn" onclick="handleOrder()">Confirmer la commande (Paiement à la livraison)</button>
        </div>`;
      calculatePrices();
    }

    function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, function(m) { if (m === '&') return '&amp;'; if (m === '<') return '&lt;'; if (m === '>') return '&gt;'; return m; }); }

    window.calculatePrices = function() {
        const subtotal = cart.reduce((sum, item) => sum + (getProductPrice(item) * (item.quantity || 1)), 0);
        const fraisLivraison = 8;
        let total = (subtotal + fraisLivraison);
        if (activeDiscount > 0) total = total * (1 - (activeDiscount / 100));
        const priceDetails = document.getElementById('priceDetails');
        if(priceDetails) {
            let discountHtml = '';
            if (activeDiscount > 0) {
              const discountAmount = (subtotal + fraisLivraison) - total;
              discountHtml = `<div class="price-row"><span>Remise (${activeDiscount}%)</span><span style="color: var(--green);">- ${discountAmount.toFixed(2)} DT</span></div>`;
            }
            priceDetails.innerHTML = `
              <div class="price-row"><span>Sous-total</span><span>${subtotal.toFixed(2)} DT</span></div>
              <div class="price-row"><span>Frais de livraison</span><span>${fraisLivraison.toFixed(2)} DT</span></div>
              ${discountHtml}
              <div class="price-row total-row"><span>Total Net</span><span>${total.toFixed(2)} DT</span></div>`;
        }
        return total;
    }

    window.applyPromo = async function() {
        const msg = document.getElementById('pMsg');
        const input = document.getElementById('pInput');
        const code = input.value.toUpperCase().trim();
        if(!code) { msg.innerText = "❌ Veuillez saisir un code d'abord"; msg.style.color = "var(--red)"; return; }
        msg.innerText = "🔄 Vérification du code..."; msg.style.color = "var(--text-muted)";
        try {
            const snapshot = await get(child(dbRef, `promos/${code}`));
            if (snapshot.exists()) {
                const data = snapshot.val();
                const today = new Date().toISOString().split('T')[0];
                if (today <= data.expiry) {
                    if ((data.used || 0) < (data.limit || 999)) {
                        activeDiscount = data.discount;
                        promoData = { code: code, ...data };
                        msg.innerText = `✅ Code appliqué ! Remise de ${activeDiscount}%`;
                        msg.style.color = "var(--green)";
                    } else { activeDiscount = 0; promoData = null; msg.innerText = `⚠️ Ce code promo a expiré "${code}"`; msg.style.color = "var(--orange)"; }
                } else { activeDiscount = 0; promoData = null; msg.innerText = `❌ Code expiré`; msg.style.color = "var(--red)"; }
            } else { activeDiscount = 0; promoData = null; msg.innerText = `❌ Code incorrect`; msg.style.color = "var(--red)"; }
            calculatePrices();
        } catch (e) { console.error(e); msg.innerText = "⚠️ Erreur de connexion à la base de données"; msg.style.color = "var(--red)"; }
    }

    window.handleOrder = async function() {
        const infoSection = document.getElementById('infoSection');
        const confirmBtn = document.getElementById('confirmBtn');
        if(!infoStep) {
            infoSection.classList.add('active');
            confirmBtn.innerHTML = "✅ Envoyer et confirmer la commande";
            confirmBtn.style.background = "linear-gradient(135deg, #22c55e, #16a34a)";
            infoSection.scrollIntoView({ behavior: 'smooth', block: 'center' });
            infoStep = true;
            return;
        }
        const nom = document.getElementById('custNom').value.trim();
        const tel1 = document.getElementById('custTel1').value.trim();
        const tel2 = document.getElementById('custTel2').value.trim();
        const ville = document.getElementById('custVille').value.trim();
        if(!nom || !tel1 || !ville) { showToast("❌ Veuillez remplir les champs obligatoires (*)", true); return; }
        if(tel1.length < 8) { showToast("❌ Le numéro de téléphone doit contenir au moins 8 chiffres", true); return; }

        const subtotal = cart.reduce((sum, item) => sum + (getProductPrice(item) * (item.quantity || 1)), 0);
        const fraisLivraison = 8;
        let total = (subtotal + fraisLivraison);
        if (activeDiscount > 0) total = total * (1 - (activeDiscount / 100));

        const orderId = push(ref(db, 'orders/')).key;
        const orderData = {
            orderId: orderId,
            clientName: nom,
            phone1: tel1,
            phone2: tel2 || "",
            city: ville,
            products: cart.map(item => ({ name: item.name, price: getProductPrice(item), quantity: item.quantity || 1, imageUrl: item.img || item.imageUrl })),
            subtotal: subtotal,
            deliveryFee: fraisLivraison,
            discountPercent: activeDiscount,
            promoCode: promoData ? promoData.code : null,
            total: total,
            status: "pending",
            createdAt: Date.now(),
            dateReadable: new Date().toLocaleString('fr-TN')
        };

        try {
            await set(ref(db, `orders/${orderId}`), orderData);
            userOrders.push({ orderId: orderId, status: "pending", createdAt: Date.now() });
            localStorage.setItem('userOrders', JSON.stringify(userOrders));
            
            if(promoData && promoData.code) {
                const currentSnap = await get(child(dbRef, `promos/${promoData.code}`));
                if (currentSnap.exists()) {
                    await update(ref(db, `promos/${promoData.code}`), { used: (currentSnap.val().used || 0) + 1 });
                }
            }
            localStorage.removeItem('cart');
            cart = [];
            infoStep = false;
            showToast(`✅ Commande envoyée avec succès ! N° #${orderId.slice(-6)}`);
            updateCartDisplay();
            switchTab('orders');
            loadOrders();
        } catch (error) {
            console.error("Erreur lors de l'envoi de la commande:", error);
            showToast("❌ Une erreur est survenue lors de l'envoi, veuillez réessayer", true);
        }
    }

    window.changeQuantity = (index, delta) => {
      if (!cart[index]) return;
      const newQuantity = (cart[index].quantity || 1) + delta;
      if (newQuantity > 0) { cart[index].quantity = newQuantity; localStorage.setItem('cart', JSON.stringify(cart)); updateCartDisplay(); }
    }

    window.removeItem = (index) => {
      if (confirm("Êtes-vous sûr de vouloir supprimer cet article du panier ?")) { cart.splice(index, 1); localStorage.setItem('cart', JSON.stringify(cart)); updateCartDisplay(); if (cart.length === 0) infoStep = false; }
    }

    async function loadOrders() {
        const container = document.getElementById('ordersContainer');
        if (userOrders.length === 0) {
            container.innerHTML = `<div class="empty-state"><i class="fas fa-box-open"></i><p>Aucune commande enregistrée pour le moment</p></div>`;
            return;
        }

        let html = '';
        let updatedOrders = false;
        
        for (const userOrder of [...userOrders]) {
            try {
                const snapshot = await get(child(dbRef, `orders/${userOrder.orderId}`));
                if (snapshot.exists()) {
                    const order = snapshot.val();
                    if (order.status === 'delivered') {
                        userOrders = userOrders.filter(o => o.orderId !== userOrder.orderId);
                        updatedOrders = true;
                        continue;
                    }
                    const statusClass = order.status === 'pending' ? 'status-pending' : (order.status === 'shipping' ? 'status-shipping' : 'status-delivered');
                    const statusText = order.status === 'pending' ? '⏳ En cours de révision' : (order.status === 'shipping' ? '🚚 En cours de livraison' : '✅ Livrée');
                    
                    // Résolution du problème d'affichage des produits
                    const productsData = order.products;
                    const productsArray = Array.isArray(productsData) ? productsData : Object.values(productsData || {});
                    
                    const productsHtml = productsArray.map(p => `
                        <div class="product-item">
                            <span>${escapeHtml(p.name)}</span>
                            <span>${p.quantity} × ${Number(p.price).toFixed(2)} DT</span>
                        </div>
                    `).join('');

                    html += `
                        <div class="order-card">
                            <div class="order-header">
                                <div>
                                    <span class="order-id">#${userOrder.orderId.slice(-8)}</span>
                                    <span class="order-date" style="margin-left:10px;">${order.dateReadable || new Date(order.createdAt).toLocaleString('fr-TN')}</span>
                                </div>
                                <span class="status-badge ${statusClass}">${statusText}</span>
                            </div>
                            <div class="products-list">${productsHtml}</div>
                            <div class="total-price">Total : ${Number(order.total).toFixed(2)} DT</div>
                        </div>
                    `;
                } else {
                    userOrders = userOrders.filter(o => o.orderId !== userOrder.orderId);
                    updatedOrders = true;
                }
            } catch (error) {
                console.error("Error loading order:", error);
            }
        }
        
        if (updatedOrders) {
            localStorage.setItem('userOrders', JSON.stringify(userOrders));
        }
        
        if (html === '') {
            container.innerHTML = `<div class="empty-state"><i class="fas fa-check-circle"></i><p>Toutes vos commandes sont complétées ! Merci pour votre confiance.</p></div>`;
        } else {
            container.innerHTML = html;
        }
    }

    const ordersRef = ref(db, 'orders');
    onValue(ordersRef, () => {
        if (document.getElementById('orders-tab').classList.contains('active')) {
            loadOrders();
        }
    });

    updateCartDisplay();
  </script>
</body>
</html>
