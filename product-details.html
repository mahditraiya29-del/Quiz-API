        .product-details-page {
            max-width: 1200px;
            margin: 0 auto;
            padding: 30px 20px;
            min-height: 100vh;
        }

        .back-to-store {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: var(--panel-light);
            border: none;
            padding: 12px 24px;
            border-radius: 30px;
            color: var(--text);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 30px;
            font-family: 'Tajawal', sans-serif;
            font-size: 15px;
            text-decoration: none;
        }

        .back-to-store:hover {
            background: var(--primary);
            color: #fff;
            transform: translateX(-5px);
        }

        .product-details-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 50px;
            background: var(--panel);
            border-radius: var(--radius);
            padding: 40px;
            box-shadow: var(--shadow);
        }

        .product-image-section {
            position: relative;
        }

        .main-image-container {
            position: relative;
            background: var(--panel-light);
            border-radius: var(--radius-sm);
            overflow: hidden;
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: zoom-in;
            transition: all 0.3s ease;
        }

        .main-image-container img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            transition: transform 0.5s ease;
            max-height: 500px;
        }

        .main-image-container.zoomed {
            cursor: zoom-out;
        }

        .main-image-container.zoomed img {
            transform: scale(1.8);
        }

        .zoom-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.03);
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .main-image-container:hover .zoom-overlay {
            opacity: 1;
        }

        .zoom-overlay i {
            font-size: 48px;
            color: var(--primary);
            background: rgba(255, 255, 255, 0.9);
            padding: 15px;
            border-radius: 50%;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.2);
        }

        .thumbnail-gallery {
            display: flex;
            gap: 12px;
            margin-top: 15px;
            overflow-x: auto;
            padding: 5px 0;
        }

        .thumbnail-gallery::-webkit-scrollbar {
            height: 5px;
        }

        .thumbnail-gallery::-webkit-scrollbar-track {
            background: var(--border);
            border-radius: 10px;
        }

        .thumbnail-gallery::-webkit-scrollbar-thumb {
            background: var(--primary);
            border-radius: 10px;
        }

        .thumbnail-item {
            width: 80px;
            height: 80px;
            min-width: 80px;
            border-radius: 12px;
            overflow: hidden;
            border: 2px solid transparent;
            cursor: pointer;
            transition: all 0.3s ease;
            background: var(--panel-light);
            flex-shrink: 0;
        }

        .thumbnail-item:hover {
            border-color: var(--primary);
            transform: scale(1.05);
        }

        .thumbnail-item.active {
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(0, 123, 192, 0.3);
        }

        .thumbnail-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .product-info-section {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .product-info-section .product-category-badge {
            display: inline-block;
            background: rgba(0, 123, 192, 0.15);
            color: var(--primary);
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            width: fit-content;
        }

        body.dark-theme .product-info-section .product-category-badge {
            background: rgba(59, 130, 246, 0.2);
        }

        .product-info-section h1 {
            font-size: 32px;
            font-weight: 800;
            color: var(--text);
            line-height: 1.3;
        }

        .product-info-section .product-rating-large {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .product-info-section .product-rating-large .stars {
            color: #fbbf24;
            font-size: 18px;
        }

        .product-info-section .product-rating-large .reviews-count {
            color: var(--text-muted);
            font-size: 14px;
        }

        .product-info-section .price-section {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px 0;
            border-top: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
        }

        .product-info-section .price-section .current-price {
            font-size: 36px;
            font-weight: 800;
            color: var(--primary);
        }

        .product-info-section .price-section .original-price {
            font-size: 20px;
            color: #9ca3af;

        }

            font-weight: 700;

        .product-info-section .description {

        .product-info-section .product-features {

            color: var(--text);

            display: flex;
            align-items: center;
            border: 2px solid var(--border);
            border-radius: 30px;

        }

        .add-to-cart-section .quantity-selector button {
            width: 44px;

            border: none;

            color: var(--text);
            font-size: 20px;
            cursor: pointer;

        }

        .add-to-cart-section .quantity-selector button:hover {
            background: var(--primary);
            color: #fff;
        }

        .add-to-cart-section .quantity-selector span {
            width: 50px;
            text-align: center;
            font-size: 18px;
            font-weight: 700;
            color: var(--text);
        }

        .add-to-cart-section .add-to-cart-main {
            flex: 1;
            background: var(--primary);
            border: none;
            padding: 14px 32px;
            border-radius: 30px;
            color: #fff;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-family: 'Tajawal', sans-serif;
            min-width: 150px;
        }

            background: var(--primary-dark);
            transform: scale(1.02);
        }

        .add-to-cart-section .add-to-cart-main:active {

            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);

            color: var(--text);
            padding: 16px 32px;
            border-radius: 30px;

            border: 2px solid var(--primary);
            display: flex;
            align-items: center;
            gap: 12px;

                max-height: 300px;

            .product-info-section .product-features .feature-item {

        // ============================================================
        // FONCTIONS UTILITAIRES
        // ============================================================

        function getAllProducts() {
            const all = [];
            Object.keys(PRODUCTS_DATA).forEach(cat => {
                PRODUCTS_DATA[cat].forEach(p => {
                    all.push({ ...p, categoryKey: cat });
                });
            });
            return all;
        }

        function getProductById(id) {
            const all = getAllProducts();
            return all.find(p => p.id === id) || null;
        }

        function generateStarsHtml(rating) {
            let html = '';
            const fullStars = Math.floor(rating);
            const hasHalfStar = rating - fullStars >= 0.5;
            for (let i = 1; i <= 5; i++) {
                if (i <= fullStars) {
                    html += '<i class="fas fa-star"></i>';
                } else if (i === fullStars + 1 && hasHalfStar) {
                    html += '<i class="fas fa-star-half-alt"></i>';
                } else {
                    html += '<i class="far fa-star"></i>';
                }
            }
            return html;
        }

        function formatPrice(price) {
            return price.toFixed(2) + ' DT';
        }

        function showToast(message) {
            const toast = document.getElementById('toastNotification');
            const toastMessage = document.getElementById('toastMessage');
            toastMessage.textContent = message;
            toast.classList.add('show');
            clearTimeout(toast._timeout);
            toast._timeout = setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        function updateCartCount() {
            try {
                const cart = JSON.parse(localStorage.getItem('cart') || '[]');
                const count = cart.reduce((sum, item) => sum + (item.quantity || 1), 0);
                document.getElementById('cartCount').textContent = count;
            } catch (e) {
                document.getElementById('cartCount').textContent = '0';
            }
        }

        function addToCart(productId) {
            const product = getProductById(productId);
            if (!product) {
                showToast('Produit non trouvé !');
                return;
            }

            const cart = JSON.parse(localStorage.getItem('cart') || '[]');
            const existing = cart.find(item => item.id === productId);

            if (existing) {
                existing.quantity = (existing.quantity || 1) + 1;
            } else {
                cart.push({
                    id: product.id,
                    name: product.name,
                    price: product.price,
                    image: product.imageUrl,
                    quantity: 1
                });
            }

            localStorage.setItem('cart', JSON.stringify(cart));
            updateCartCount();
            showToast(`${product.name} ajouté au panier !`);
        }

                    <div class="not-found">
                        <i class="fas fa-box-open"></i>
                        <h2>Produit non trouvé</h2>
                        <p>Le produit que vous recherchez n'existe pas ou a été supprimé.</p>
                        <a href="index.html" class="back-to-store" style="display:inline-flex;margin-top:20px;">
                            <i class="fas fa-arrow-left"></i> Retour au magasin
                        </a>
                    </div>
                `;
                return;
            }

            const discount = product.originalPrice && product.originalPrice > product.price 
                ? Math.round((1 - product.price / product.originalPrice) * 100) 
                : 0;

            const images = product.images && product.images.length > 0 
                ? product.images 
                : [product.imageUrl];

            const features = product.features || [];

            container.innerHTML = `
                <div class="product-details-grid">
                    <div class="product-image-section">
                        <div class="main-image-container" id="mainImageContainer">
                            <img id="productMainImage" src="${product.imageUrl}" alt="${product.name}" 
                                 onerror="this.src='https://via.placeholder.com/400x400/007bc0/ffffff?text=${encodeURIComponent(product.name)}'">
                            <div class="zoom-overlay">
                                <i class="fas fa-search-plus"></i>
                            </div>
                        </div>
                        <div class="thumbnail-gallery" id="thumbnailGallery">
                            ${images.map((img, index) => `
                                <div class="thumbnail-item ${index === 0 ? 'active' : ''}" data-index="${index}">
                                    <img src="${img}" alt="${product.name} ${index + 1}" 
                                         onerror="this.src='https://via.placeholder.com/80x80/007bc0/ffffff?text=${encodeURIComponent(product.name)}'">
                                </div>
                            `).join('')}
                        </div>
                    </div>

                    <div class="product-info-section">
                        <span class="product-category-badge">${product.category}</span>
                        <h1>${product.name}</h1>
                        <div class="product-rating-large">
                            <span class="stars">${generateStarsHtml(product.rating || 4.5)}</span>
                            <span class="reviews-count">(${product.reviews || 0} avis)</span>
                        </div>
                        <div class="price-section">
                            <span class="current-price">${formatPrice(product.price)}</span>
                            ${product.originalPrice && product.originalPrice > product.price ? `
                                <span class="original-price">${formatPrice(product.originalPrice)}</span>
                                <span class="discount-badge">-${discount}%</span>
                            ` : ''}
                        </div>
                        <p class="description">${product.desc || 'Aucune description disponible.'}</p>
                        <div class="product-features">
                            ${features.map(f => `
                                <div class="feature-item">
                                    <i class="fas fa-check-circle"></i> ${f}
                                </div>
                            `).join('')}
                        </div>
                        <div class="add-to-cart-section">
                            <div class="quantity-selector">
                                <button id="decrementQty"><i class="fas fa-minus"></i></button>
                                <span id="quantityDisplay">1</span>
                                <button id="incrementQty"><i class="fas fa-plus"></i></button>
                            </div>
                            <button class="add-to-cart-main" id="addToCartMain">
                                <i class="fas fa-cart-plus"></i> Ajouter au panier
                            </button>
                        </div>
                    </div>
                </div>
            `;

            // --- Gestion de la quantité ---
            let quantity = 1;
            document.getElementById('decrementQty').addEventListener('click', () => {
                if (quantity > 1) {
                    quantity--;
                    document.getElementById('quantityDisplay').textContent = quantity;
                }
            });
            document.getElementById('incrementQty').addEventListener('click', () => {
                if (quantity < 99) {
                    quantity++;
                    document.getElementById('quantityDisplay').textContent = quantity;
                }
            });

            // --- Ajout au panier ---
            document.getElementById('addToCartMain').addEventListener('click', () => {
                const cart = JSON.parse(localStorage.getItem('cart') || '[]');
                const existing = cart.find(item => item.id === product.id);
                if (existing) {
                    existing.quantity = (existing.quantity || 1) + quantity;
                } else {
                    cart.push({
                        id: product.id,
                        name: product.name,
                        price: product.price,
                        image: product.imageUrl,
                        quantity: quantity
                    });
                }
                localStorage.setItem('cart', JSON.stringify(cart));
                updateCartCount();
                showToast(`${product.name} (x${quantity}) ajouté au panier !`);
            });

            // --- Zoom sur l'image ---
            document.getElementById('mainImageContainer').addEventListener('click', function() {
                this.classList.toggle('zoomed');
            });

            // --- Miniatures ---
            document.querySelectorAll('.thumbnail-item').forEach(thumb => {
                thumb.addEventListener('click', function() {
                    const imgSrc = this.querySelector('img').src;
                    document.getElementById('productMainImage').src = imgSrc;
                    document.querySelectorAll('.thumbnail-item').forEach(t => t.classList.remove('active'));
                    this.classList.add('active');
                    document.getElementById('mainImageContainer').classList.remove('zoomed');
                });
            });
        }

        // ============================================================
        // INITIALISATION
        // ============================================================

        document.addEventListener('DOMContentLoaded', function() {
            // Thème
            const savedTheme = localStorage.getItem('kef-theme') || 'light';
            if (savedTheme === 'dark') {
                document.body.classList.add('dark-theme');
                document.querySelector('#themeToggle i').className = 'fas fa-sun';
            }

            document.getElementById('themeToggle').addEventListener('click', function() {
                document.body.classList.toggle('dark-theme');
                const isDark = document.body.classList.contains('dark-theme');
                localStorage.setItem('kef-theme', isDark ? 'dark' : 'light');
                this.querySelector('i').className = isDark ? 'fas fa-sun' : 'fas fa-moon';
            });

            // Panier
            document.getElementById('cartBtn').addEventListener('click', () => {
                window.location.href = 'panier.html';
            });

            updateCartCount();

            // Récupérer l'ID du produit depuis l'URL
            const urlParams = new URLSearchParams(window.location.search);
            const productId = urlParams.get('id');

            if (productId) {
                const product = getProductById(productId);
                renderProduct(product);
            } else {
                document.getElementById('productContent').innerHTML = `
                    <div class="not-found">
                        <i class="fas fa-exclamation-circle"></i>
                        <h2>ID de produit manquant</h2>
                        <p>Aucun produit spécifié dans l'URL.</p>
                        <a href="index.html" class="back-to-store" style="display:inline-flex;margin-top:20px;">
                            <i class="fas fa-arrow-left"></i> Retour au magasin
                        </a>
                    </div>
                `;
            }
        });
    </script>
</body>
</html>
