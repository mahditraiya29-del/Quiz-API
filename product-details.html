    <style>
        /* ====== تنسيق صفحة تفاصيل المنتج ====== */
        .product-details-page {
            max-width: 1200px;
            margin: 0 auto;
            padding: 30px 20px;
            min-height: 100vh;
        }

        .back-to-store {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: var(--panel-light);
            border: none;
            padding: 12px 24px;
            border-radius: 30px;
            color: var(--text);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 30px;
            font-family: 'Tajawal', sans-serif;
            font-size: 15px;
            text-decoration: none;
        }

        .back-to-store:hover {
            background: var(--primary);
            color: #fff;
            transform: translateX(-5px);
        }

        .product-details-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 50px;
            background: var(--panel);
            border-radius: var(--radius);
            padding: 40px;
            box-shadow: var(--shadow);
        }

        /* ====== قسم الصورة ====== */
        .product-image-section {
            position: relative;
        }

        .main-image-container {
            position: relative;
            background: var(--panel-light);
            border-radius: var(--radius-sm);
            overflow: hidden;
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: zoom-in;
            transition: all 0.3s ease;
            border: 1px solid var(--border);
        }

        .main-image-container img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            transition: transform 0.5s ease;
            max-height: 500px;
            padding: 20px;
        }

        .main-image-container.zoomed {
            cursor: zoom-out;
        }

        .main-image-container.zoomed img {
            transform: scale(1.8);
        }

        .zoom-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.03);
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .main-image-container:hover .zoom-overlay {
            opacity: 1;
        }

        .zoom-overlay i {
            font-size: 48px;
            color: var(--primary);
            background: rgba(255, 255, 255, 0.9);
            padding: 15px;
            border-radius: 50%;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.2);
        }

        /* ====== معرض المصغرات ====== */
        .thumbnail-gallery {
            display: flex;
            gap: 12px;
            margin-top: 15px;
            overflow-x: auto;
            padding: 5px 0;
        }

        .thumbnail-gallery::-webkit-scrollbar {
            height: 5px;
        }

        .thumbnail-gallery::-webkit-scrollbar-track {
            background: var(--border);
            border-radius: 10px;
        }

        .thumbnail-gallery::-webkit-scrollbar-thumb {
            background: var(--primary);
            border-radius: 10px;
        }

        .thumbnail-item {
            width: 80px;
            height: 80px;
            min-width: 80px;
            border-radius: 12px;
            overflow: hidden;
            border: 2px solid transparent;
            cursor: pointer;
            transition: all 0.3s ease;
            background: var(--panel-light);
            flex-shrink: 0;
        }

        .thumbnail-item:hover {
            border-color: var(--primary);
            transform: scale(1.05);
        }

        .thumbnail-item.active {
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(0, 123, 192, 0.3);
        }

        .thumbnail-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* ====== معلومات المنتج ====== */
        .product-info-section {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .product-info-section .product-brand {
            font-size: 14px;
            color: var(--text-muted);
            font-weight: 500;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .product-info-section h1 {
            font-size: 28px;
            font-weight: 800;
            color: var(--text);
            line-height: 1.3;
        }

        .product-info-section .product-subtitle {
            font-size: 14px;
            color: var(--text-muted);
            font-weight: 500;
        }

        .product-info-section .product-category-badge {
            display: inline-block;
            background: rgba(0, 123, 192, 0.12);
            color: var(--primary);
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            width: fit-content;
        }

        body.dark-theme .product-info-section .product-category-badge {
            background: rgba(59, 130, 246, 0.2);
        }

        .product-info-section .product-price-large {
            font-size: 36px;
            font-weight: 900;
            color: var(--primary);
            padding: 10px 0;
        }

        .product-info-section .product-price-large .currency {
            font-size: 20px;
            font-weight: 700;
        }

        .product-info-section .price-section {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px 0;
            border-top: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
        }

        .product-info-section .price-section .current-price {
            font-size: 36px;
            font-weight: 900;
            color: var(--primary);
        }

        .product-info-section .price-section .original-price {
            font-size: 20px;
            color: #9ca3af;
            text-decoration: line-through;
        }

        .product-info-section .price-section .discount-badge {
            background: #ef4444;
            color: #fff;
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 700;
        }

        .product-info-section .description {
            color: var(--text-muted);
            line-height: 1.8;
            font-size: 15px;
        }

        .product-info-section .description strong {
            color: var(--text);
        }

        /* ====== النكهات ====== */
        .product-flavors {
            margin-top: 5px;
        }

        .product-flavors .flavors-title {
            font-weight: 700;
            font-size: 15px;
            color: var(--text);
            margin-bottom: 10px;
            display: block;
        }

        .product-flavors .flavors-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .product-flavors .flavor-tag {
            background: var(--panel-light);
            border: 1px solid var(--border);
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 13px;
            color: var(--text);
            transition: all 0.3s ease;
            cursor: default;
        }

        .product-flavors .flavor-tag:hover {
            border-color: var(--primary);
            background: rgba(0, 123, 192, 0.05);
        }

        body.dark-theme .product-flavors .flavor-tag:hover {
            background: rgba(59, 130, 246, 0.1);
        }

        /* ====== الميزات ====== */
        .product-info-section .product-features {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 5px;
        }

        .product-info-section .product-features .feature-item {
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--panel-light);
            padding: 10px 15px;
            border-radius: 12px;
            font-size: 14px;
            color: var(--text);
        }

        .product-info-section .product-features .feature-item i {
            color: var(--primary);
            font-size: 16px;
        }

        /* ====== زر الإضافة ====== */
        .add-to-cart-section {
            display: flex;
            gap: 15px;
            margin-top: 10px;
            flex-wrap: wrap;
        }

        .add-to-cart-section .quantity-selector {
            display: flex;
            align-items: center;
            border: 2px solid var(--border);
            border-radius: 30px;
            overflow: hidden;
            flex-shrink: 0;
        }

        .add-to-cart-section .quantity-selector button {
            width: 44px;
            height: 44px;
            border: none;
            background: var(--panel-light);
            color: var(--text);
            font-size: 20px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: 'Tajawal', sans-serif;
        }

        .add-to-cart-section .quantity-selector button:hover {
            background: var(--primary);
            color: #fff;
        }

        .add-to-cart-section .quantity-selector span {
            width: 50px;
            text-align: center;
            font-size: 18px;
            font-weight: 700;
            color: var(--text);
        }

        .add-to-cart-section .add-to-cart-main {
            flex: 1;
            background: var(--primary);
            border: none;
            padding: 14px 32px;
            border-radius: 30px;
            color: #fff;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-family: 'Tajawal', sans-serif;
            min-width: 180px;
        }

        .add-to-cart-section .add-to-cart-main:hover {
            background: var(--primary-dark);
            transform: scale(1.02);
        }

        .add-to-cart-section .add-to-cart-main:active {
            transform: scale(0.98);
        }

        /* ====== Toast ====== */
        .toast-notification {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--panel);
            color: var(--text);
            padding: 16px 32px;
            border-radius: 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            z-index: 9999;
            opacity: 0;
            transition: all 0.5s ease;
            font-weight: 600;
            border: 2px solid var(--primary);
            display: flex;
            align-items: center;
            gap: 12px;
            font-family: 'Tajawal', sans-serif;
        }

        .toast-notification.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .toast-notification i {
            color: var(--primary);
            font-size: 20px;
        }

        /* ====== حالات التحميل والخطأ ====== */
        .loading-state {
            text-align: center;
            padding: 80px 20px;
            color: var(--text-muted);
        }

        .loading-state i {
            font-size: 48px;
            margin-bottom: 15px;
            color: var(--primary);
        }

        .not-found {
            text-align: center;
            padding: 80px 20px;
        }

        .not-found i {
            font-size: 64px;
            color: var(--text-muted);
            margin-bottom: 20px;
        }

        .not-found h2 {
            font-size: 28px;
            color: var(--text);
            margin-bottom: 10px;
        }

        .not-found p {
            color: var(--text-muted);
        }

        /* ====== زر السلة في الأعلى ====== */
        .cart-top-btn {
            background: var(--panel-light);
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 12px;
            color: var(--text);
            cursor: pointer;
            font-size: 18px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .cart-top-btn:hover {
            background: var(--primary);
            color: #fff;
        }

        .cart-top-btn .badge {
            position: absolute;
            top: -5px;
            right: -5px;
            background: #ef4444;
            color: #fff;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            font-size: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
        }

        /* ====== Responsive ====== */
        @media (max-width: 992px) {
            .product-details-grid {
                grid-template-columns: 1fr;
                gap: 30px;
                padding: 25px;
            }

            .product-info-section h1 {
                font-size: 24px;
            }

            .product-info-section .product-price-large {
                font-size: 30px;
            }

            .product-info-section .product-features {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 576px) {
            .product-details-page {
                padding: 15px;
            }

            .product-details-grid {
                padding: 15px;
                border-radius: var(--radius-sm);
            }

            .add-to-cart-section {
                flex-direction: column;
            }

            .add-to-cart-section .add-to-cart-main {
                width: 100%;
                min-width: unset;
            }

            .product-info-section h1 {
                font-size: 20px;
            }

            .product-info-section .product-price-large {
                font-size: 26px;
            }

            .thumbnail-item {
                width: 60px;
                height: 60px;
                min-width: 60px;
            }

            .back-to-store {
                padding: 10px 18px;
                font-size: 13px;
            }

            .main-image-container img {
                max-height: 250px;
                padding: 10px;
            }

            .product-info-section .product-features .feature-item {
                font-size: 12px;
                padding: 8px 12px;
            }

            .product-flavors .flavor-tag {
                font-size: 12px;
                padding: 4px 12px;
            }
        }
    </style>
</head>

                    flavors: ["Chocolat", "Vanille", "Fraise"],

                }
            ],
            multivitamine: [
                {
                    id: "multi1",
                    name: "Multivitamine Sport",
                    brand: "Impact Nutrition",
                    category: "Multivitamine",
                    price: 29.90,
                    originalPrice: 39.90,
                    imageUrl: "https://via.placeholder.com/400x400/22d3ee/ffffff?text=Multivitamine",
                    images: [
                        "https://via.placeholder.com/400x400/22d3ee/ffffff?text=Multivitamine+1",
                        "https://via.placeholder.com/400x400/06b6d4/ffffff?text=Multivitamine+2"
                    ],
                    desc: "Multivitamine complète spécialement conçue pour les sportifs. Apporte tous les vitamines et minéraux essentiels.",

                {

                    price: 24.90,

                    imageUrl: "https://via.placeholder.com/400x400/6366f1/ffffff?text=Omega+3",
                    images: [
                        "https://via.placeholder.com/400x400/6366f1/ffffff?text=Omega+3+1",
                        "https://via.placeholder.com/400x400/4f46e5/ffffff?text=Omega+3+2"
                    ],
                    desc: "Oméga-3 concentré pour la santé cardiovasculaire et la réduction de l'inflammation. Idéal pour les sportifs.",
                    subtitle: "60 gélules • 2 mois",
                    rating: 4.7,
                    reviews: 789,
                    features: ["1000mg EPA/DHA", "Purifié", "Sans mercure", "Certifié"],
                    flavors: ["Sans saveur"],
                    inStock: true
                }
            ]
        };


        // ============================================================
        // 🛠️ 2. دوال مساعدة
        // ============================================================

        function getAllProducts() {
            const all = [];
            Object.keys(PRODUCTS_DATA).forEach(cat => {
                PRODUCTS_DATA[cat].forEach(p => {
                    all.push({ ...p, categoryKey: cat });
                });
            });
            return all;
        }

        function getProductById(id) {
            return getAllProducts().find(p => p.id === id) || null;
        }

        function generateStarsHtml(rating) {
            let html = '';
            const fullStars = Math.floor(rating);
            const hasHalfStar = rating - fullStars >= 0.5;
            for (let i = 1; i <= 5; i++) {
                if (i <= fullStars) {
                    html += '<i class="fas fa-star"></i>';
                } else if (i === fullStars + 1 && hasHalfStar) {
                    html += '<i class="fas fa-star-half-alt"></i>';
                } else {
                    html += '<i class="far fa-star"></i>';
                }
            }
            return html;
        }

        function formatPrice(price) {
            return price.toFixed(2) + ' TND';
        }

        function showToast(message) {
            const toast = document.getElementById('toastNotification');
            const toastMessage = document.getElementById('toastMessage');
            toastMessage.textContent = message;
            toast.classList.add('show');
            clearTimeout(toast._timeout);
            toast._timeout = setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        function updateCartCount() {
            try {
                const cart = JSON.parse(localStorage.getItem('cart') || '[]');
                const count = cart.reduce((sum, item) => sum + (item.quantity || 1), 0);
                document.getElementById('cartCount').textContent = count;
            } catch (e) {
                document.getElementById('cartCount').textContent = '0';
            }
        }

        function addToCart(productId, quantity) {
            const product = getProductById(productId);
            if (!product) {
                showToast('Produit non trouvé !');
                return;
            }

            const cart = JSON.parse(localStorage.getItem('cart') || '[]');
            const existing = cart.find(item => item.id === productId);

            if (existing) {
                existing.quantity = (existing.quantity || 1) + quantity;
            } else {
                cart.push({
                    id: product.id,
                    name: product.name,
                    price: product.price,
                    image: product.imageUrl,
                    quantity: quantity || 1
                });
            }

            localStorage.setItem('cart', JSON.stringify(cart));
            updateCartCount();
            showToast(`${product.name} (x${quantity || 1}) ajouté au panier !`);
        }


        // ============================================================
        // 🖼️ 3. عرض المنتج في الصفحة
        // ============================================================

        function renderProduct(product) {
            const container = document.getElementById('productContent');

            if (!product) {
                container.innerHTML = `
                    <div class="not-found">
                        <i class="fas fa-box-open"></i>
                        <h2>Produit non trouvé</h2>
                        <p>Le produit que vous recherchez n'existe pas ou a été supprimé.</p>
                        <a href="index.html" class="back-to-store" style="display:inline-flex;margin-top:20px;">
                            <i class="fas fa-arrow-left"></i> Retour au magasin
                        </a>
                    </div>
                `;
                return;
            }

            const discount = product.originalPrice && product.originalPrice > product.price
                ? Math.round((1 - product.price / product.originalPrice) * 100)
                : 0;

            const images = product.images && product.images.length > 0
                ? product.images
                : [product.imageUrl];

            const features = product.features || [];
            const flavors = product.flavors || [];

            // إنشاء HTML النكهات
            let flavorsHtml = '';
            if (flavors.length > 0) {
                flavorsHtml = `
                    <div class="product-flavors">
                        <span class="flavors-title">🍃 Saveurs disponibles :</span>
                        <div class="flavors-list">
                            ${flavors.map(f => `<span class="flavor-tag">${f}</span>`).join('')}
                        </div>
                    </div>
                `;
            }

            // بناء واجهة المنتج
            container.innerHTML = `
                <div class="product-details-grid">
                    <!-- ====== قسم الصورة ====== -->
                    <div class="product-image-section">
                        <div class="main-image-container" id="mainImageContainer">
                            <img id="productMainImage" src="${product.imageUrl}" alt="${product.name}"
                                 onerror="this.src='https://via.placeholder.com/400x400/007bc0/ffffff?text=${encodeURIComponent(product.name)}'">
                            <div class="zoom-overlay">
                                <i class="fas fa-search-plus"></i>
                            </div>
                        </div>
                        <div class="thumbnail-gallery" id="thumbnailGallery">
                            ${images.map((img, index) => `
                                <div class="thumbnail-item ${index === 0 ? 'active' : ''}" data-index="${index}">
                                    <img src="${img}" alt="${product.name} ${index + 1}"
                                         onerror="this.src='https://via.placeholder.com/80x80/007bc0/ffffff?text=${encodeURIComponent(product.name)}'">
                                </div>
                            `).join('')}
                        </div>
                    </div>

                    <!-- ====== قسم المعلومات ====== -->
                    <div class="product-info-section">
                        <div style="display:flex;flex-wrap:wrap;gap:10px;align-items:center;justify-content:space-between;">
                            <span class="product-brand">${product.brand || 'KEF Muscle Store'}</span>
                            <span class="product-category-badge">${product.category}</span>
                        </div>

                        <h1>${product.name}</h1>

                        ${product.subtitle ? `<div class="product-subtitle">${product.subtitle}</div>` : ''}

                        <div class="product-price-large">${formatPrice(product.price)}</div>

                        <div class="price-section">
                            <span class="current-price">${formatPrice(product.price)}</span>
                            ${product.originalPrice && product.originalPrice > product.price ? `
                                <span class="original-price">${formatPrice(product.originalPrice)}</span>
                                <span class="discount-badge">-${discount}%</span>
                            ` : ''}
                        </div>

                        <p class="description">${product.desc || 'Aucune description disponible.'}</p>

                        ${flavorsHtml}

                        <div class="product-features">
                            ${features.map(f => `
                                <div class="feature-item">
                                    <i class="fas fa-check-circle"></i> ${f}
                                </div>
                            `).join('')}
                        </div>

                        <div class="add-to-cart-section">
                            <div class="quantity-selector">
                                <button id="decrementQty"><i class="fas fa-minus"></i></button>
                                <span id="quantityDisplay">1</span>
                                <button id="incrementQty"><i class="fas fa-plus"></i></button>
                            </div>
                            <button class="add-to-cart-main" id="addToCartMain">
                                <i class="fas fa-cart-plus"></i> Ajouter au panier
                            </button>
                        </div>
                    </div>
                </div>
            `;

            // ====== إضافة الأحداث ======

            // --- إدارة الكمية ---
            let quantity = 1;
            document.getElementById('decrementQty').addEventListener('click', () => {
                if (quantity > 1) {
                    quantity--;
                    document.getElementById('quantityDisplay').textContent = quantity;
                }
            });
            document.getElementById('incrementQty').addEventListener('click', () => {
                if (quantity < 99) {
                    quantity++;
                    document.getElementById('quantityDisplay').textContent = quantity;
                }
            });

            // --- زر الإضافة إلى السلة ---
            document.getElementById('addToCartMain').addEventListener('click', () => {
                addToCart(product.id, quantity);
            });

            // --- تكبير الصورة ---
            document.getElementById('mainImageContainer').addEventListener('click', function() {
                this.classList.toggle('zoomed');
            });

            // --- معرض المصغرات ---
            document.querySelectorAll('.thumbnail-item').forEach(thumb => {
                thumb.addEventListener('click', function() {
                    const imgSrc = this.querySelector('img').src;
                    document.getElementById('productMainImage').src = imgSrc;
                    document.querySelectorAll('.thumbnail-item').forEach(t => t.classList.remove('active'));
                    this.classList.add('active');
                    document.getElementById('mainImageContainer').classList.remove('zoomed');
                });
            });
        }


        // ============================================================
        // 🚀 4. تهيئة الصفحة
        // ============================================================

        document.addEventListener('DOMContentLoaded', function() {

            // --- تطبيق الثيم ---
            const savedTheme = localStorage.getItem('kef-theme') || 'light';
            if (savedTheme === 'dark') {
                document.body.classList.add('dark-theme');
                document.querySelector('#themeToggle i').className = 'fas fa-sun';
            }

            document.getElementById('themeToggle').addEventListener('click', function() {
                document.body.classList.toggle('dark-theme');
                const isDark = document.body.classList.contains('dark-theme');
                localStorage.setItem('kef-theme', isDark ? 'dark' : 'light');
                this.querySelector('i').className = isDark ? 'fas fa-sun' : 'fas fa-moon';
            });

            // --- زر السلة ---
            document.getElementById('cartBtn').addEventListener('click', () => {
                window.location.href = 'panier.html';
            });

            // --- تحديث عدد السلة ---
            updateCartCount();

            // --- الحصول على ID المنتج من الرابط ---
            const urlParams = new URLSearchParams(window.location.search);
            const productId = urlParams.get('id');

            if (productId) {
                const product = getProductById(productId);
                renderProduct(product);
            } else {
                document.getElementById('productContent').innerHTML = `
                    <div class="not-found">
                        <i class="fas fa-exclamation-circle"></i>
                        <h2>ID de produit manquant</h2>
                        <p>Aucun produit spécifié dans l'URL.</p>
                        <a href="index.html" class="back-to-store" style="display:inline-flex;margin-top:20px;">
                            <i class="fas fa-arrow-left"></i> Retour au magasin
                        </a>
                    </div>
                `;
            }
        });
    </script>

</body>
